<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notice Board | Admin | Dormatrix</title>
    <!-- Use Inter font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    <style>
        .notice-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
        }
        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .notice-card {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .notice-content h3 { margin: 0 0 0.5rem 0; color: #1e293b; }
        .notice-content p { margin: 0 0 0.5rem 0; color: #475569; }
        .notice-meta { font-size: 0.8rem; color: #94a3b8; }
        .action-btns {
            display: flex;
            gap: 0.5rem;
        }
        .btn-edit, .btn-delete {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-edit { background: #dbeafe; color: #2563eb; }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        
        /* Modal for editing */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon small-logo"></div>
                <h2>Dormatrix</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin_dashboard.html" class="nav-item">Dashboard</a>
                <a href="admin_rooms.html" class="nav-item">Room Management</a>
                <a href="admin_gatepass.html" class="nav-item">Gate Passes</a>
                <a href="admin_complaint.html" class="nav-item">Complaints</a>
                <a href="admin_menu.html" class="nav-item">Menu & Voting</a>
                <a href="admin_visitor.html" class="nav-item">Visitor Log</a>
                <a href="admin_notice.html" class="nav-item active">Notice Board</a>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <!-- Top App Bar -->
            <header class="topbar">
                <div class="greeting">
                    <h1>Notice Board</h1>
                    <p>Post announcements to tenant portals</p>
                </div>
                <div class="user-profile">
                    <div class="avatar">
                        <span id="userRole">Admin</span>
                    </div>
                    <a href="#" id="logoutBtn" class="logout-link">Logout</a>
                </div>
            </header>

            <div class="content-area">
                <div class="dashboard-grid-2">
                    <div class="notice-container">
                        <h2>Post New Notice</h2>
                        <form id="noticeForm">
                            <div class="form-group">
                                <label for="nTitle">Notice Title</label>
                                <input type="text" id="nTitle" required placeholder="E.g., Hostels closing for summer">
                            </div>
                            <div class="form-group">
                                <label for="nContent">Notice Content</label>
                                <textarea id="nContent" required placeholder="Write your announcement here..." rows="4"></textarea>
                            </div>
                            <button type="submit" class="btn-primary" id="postNoticeBtn">Publish Notice</button>
                        </form>
                    </div>

                    <div class="notice-container">
                        <h2>Published Notices</h2>
                        <div id="noticesList">
                            <div style="text-align: center; color: #64748b;">Loading notices...</div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2 style="margin-top:0;">Edit Notice</h2>
            <form id="editNoticeForm">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" id="editTitle" required>
                </div>
                <div class="form-group">
                    <label>Content</label>
                    <textarea id="editContent" required rows="4"></textarea>
                </div>
                <div style="display:flex; gap:1rem; margin-top:1rem;">
                    <button type="submit" class="btn-primary" style="flex:1;">Save Changes</button>
                    <button type="button" class="btn-outline" style="flex:1;" onclick="document.getElementById('editModal').style.display='none'">Cancel</button>
                </div>
            </form>
        </div>
    </div>
    
    <script src="./js/admin_notice.js"></script>
</body>
</html>
