<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Dormatrix - Unified Hostel Operations Platform</title>
    <!-- Use Inter font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/auth.css">
    <meta name="description" content="Digitizing hostel operations seamlessly.">
</head>
<body>
    <div class="split-container">
        <!-- Left Banner Panel (Illustration/Gradient) -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo-icon"></div>
                <h1>Dormatrix</h1>
            </div>
            <div class="hero-content">
                <h2>Hostel operations, <br>simplified.</h2>
                <p>Digitizing your room allocation, gate passes, visitor logs, and complaints all in one secure place.</p>
            </div>
            
            <!-- Dynamic CSS decorations -->
            <div class="decorative-circles">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
                <div class="circle circle-3"></div>
            </div>
        </div>
        
        <!-- Right Login Panel -->
        <div class="right-panel">
            <div class="login-container">
                <h2>Welcome Back</h2>
                <p class="subtitle">Please sign in to your dashboard</p>
                
                <form id="loginForm" novalidate>
                    <!-- Role Toggler -->
                    <div class="role-selector" role="radiogroup" aria-label="Select User Role">
                        <input type="radio" id="roleTenant" name="role" value="tenant" checked>
                        <label for="roleTenant" class="role-btn">
                            Tenant
                        </label>
                        
                        <input type="radio" id="roleAdmin" name="role" value="admin">
                        <label for="roleAdmin" class="role-btn">
                            Admin
                        </label>
                        <!-- Animated background pill -->
                        <div class="role-highlight"></div>
                    </div>

                    <!-- Input Fields -->
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com" autocomplete="email">
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                        </div>
                    </div>

                    <div class="forgot-password">
                        <a href="#">Forgot password?</a>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Sign In</span>
                        <div class="loader" id="btnLoader"></div>
                    </button>
                    
                    <!-- Error Message Container -->
                    <div id="errorMessage" class="error-message" role="alert"></div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="./js/auth.js"></script>
</body>
</html>
