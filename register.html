<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Dormatrix</title>
    <!-- Use Inter font for a modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/auth.css">
</head>
<body>
    <div class="split-container">
        <!-- Left Banner Panel (Illustration/Gradient) -->
        <div class="left-panel">
            <div class="brand">
                <div class="logo-icon"></div>
                <h1>Dormatrix</h1>
            </div>
            <div class="hero-content" style="margin-top: 4rem;">
                <h2>Join the platform.</h2>
                <p>Register as a Tenant to manage your accommodation, or as an Admin to oversee operations.</p>
            </div>
            
            <div class="decorative-circles">
                <div class="circle circle-1"></div>
                <div class="circle circle-2"></div>
                <div class="circle circle-3"></div>
            </div>
        </div>
        
        <!-- Right Registration Form Panel -->
        <div class="right-panel">
            <div class="login-container" style="max-height: 95vh; overflow-y: auto;">
                <h2>Create an Account</h2>
                <p class="subtitle">Set up your new profile</p>
                
                <form id="registerForm" novalidate>
                    <!-- Role Toggler -->
                    <div class="role-selector" role="radiogroup">
                        <input type="radio" id="roleTenant" name="role" value="tenant" checked>
                        <label for="roleTenant" class="role-btn">Tenant</label>
                        
                        <input type="radio" id="roleAdmin" name="role" value="admin">
                        <label for="roleAdmin" class="role-btn">Admin</label>
                        <div class="role-highlight"></div>
                    </div>

                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required placeholder="name@example.com">
                    </div>
                    
                    <div class="form-group" id="roomGroup">
                        <label for="roomNumber">Room Number (Optional)</label>
                        <input type="text" id="roomNumber" placeholder="e.g. A-101">
                    </div>

                    <div class="form-group">
                        <label for="password">Create Password</label>
                        <input type="password" id="password" required placeholder="••••••••">
                    </div>

                    <button type="submit" class="submit-btn" id="submitBtn">
                        <span class="btn-text">Sign Up</span>
                        <div class="loader" id="btnLoader"></div>
                    </button>
                    
                    <div id="errorMessage" class="error-message" role="alert"></div>
                    
                    <!-- Login Link -->
                    <div class="signup-link">
                        Already have an account? <a href="index.html">Sign in</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    
    <script src="./js/register.js"></script>
</body>
</html>
