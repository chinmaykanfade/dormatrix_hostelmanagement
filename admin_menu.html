<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mess Menu & Voting | Admin | Dormatrix</title>
    <!-- Use Inter font for a modern look -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/auth.css">
    <link rel="stylesheet" href="./css/dashboard.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .menu-container {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }
        .form-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            margin-bottom: 1rem;
        }
        .form-group label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group textarea {
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
        }
        .chart-container {
            position: relative;
            height: 300px;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <div class="logo-icon small-logo"></div>
                <h2>Dormatrix</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="admin_dashboard.html" class="nav-item">Dashboard</a>
                <a href="admin_rooms.html" class="nav-item">Room Management</a>
                <a href="admin_gatepass.html" class="nav-item">Gate Passes</a>
                <a href="admin_complaint.html" class="nav-item">Complaints</a>
                <a href="admin_menu.html" class="nav-item active">Menu & Voting</a>
                <a href="#" class="nav-item">Visitor Log</a>
                <a href="#" class="nav-item">Notice Board</a>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <main class="main-content">
            <!-- Top App Bar -->
            <header class="topbar">
                <div class="greeting">
                    <h1>Mess Menu & Voting</h1>
                    <p>Manage daily food menus and track student satisfaction</p>
                </div>
                <div class="user-profile">
                    <div class="avatar">
                        <span id="userRole">Admin</span>
                    </div>
                    <a href="#" id="logoutBtn" class="logout-link">Logout</a>
                </div>
            </header>

            <div class="content-area">
                <div class="dashboard-grid-2">
                    <div class="menu-container">
                        <h2>Upload Daily Menu</h2>
                        <form id="menuForm">
                            <div class="form-group">
                                <label for="menuDate">Date</label>
                                <input type="date" id="menuDate" required>
                            </div>
                            <div class="form-group">
                                <label for="mBreakfast">Breakfast</label>
                                <textarea id="mBreakfast" required placeholder="E.g., Poha, Tea, Bread Jam..." rows="2"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="mLunch">Lunch</label>
                                <textarea id="mLunch" required placeholder="E.g., Rice, Dal, Mixed Veg, Chapati..." rows="2"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="mDinner">Dinner</label>
                                <textarea id="mDinner" required placeholder="E.g., Paneer Butter Masala, Roti, Rice..." rows="2"></textarea>
                            </div>
                            <button type="submit" class="btn-primary" id="saveMenuBtn">Save / Update Menu</button>
                        </form>
                    </div>

                    <div class="menu-container">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 1rem;">
                            <h2>Voting Results</h2>
                            <input type="date" id="chartDate" style="padding:0.4rem; border-radius:4px; border:1px solid #e2e8f0;">
                        </div>
                        <div class="chart-container">
                            <canvas id="votingChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script src="./js/admin_menu.js"></script>
</body>
</html>
